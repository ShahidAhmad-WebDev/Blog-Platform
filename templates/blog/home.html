{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<h2>Latest Posts</h2>
{% for post in posts %}
<div class="card mb-3">
    <div class="card-body">
        <h5>{{ post.title }}</h5>
        <p>{{ post.content|truncatewords:20 }}</p>
    </div>
</div>
{% empty %}
<p>Koi post nahi hai abhi.</p>
{% endfor %}
{% endblock %}
